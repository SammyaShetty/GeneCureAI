<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GeneCure</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 2rem;
            border: 1px solid rgba(0,212,255,0.15);
            backdrop-filter: blur(18px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid rgba(0,212,255,0.3);
        }

        header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #9c27b0);
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
        }

        .admin-badge {
            background: #f0eded;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            margin-left: 10px;
        }

        .header-actions a {
            padding: 0.6rem 1.3rem;
            border-radius: 50px;
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.4);
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.25s;
        }

        .header-actions a:hover {
            background: linear-gradient(45deg,#00d4ff,#9c27b0);
            color: #fff;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 1.3rem;
            margin: 1.8rem 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1.6rem;
            border: 1px solid rgba(0,212,255,0.25);
            transition: 0.3s;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0px 0px 18px rgba(0,212,255,0.25);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #00d4ff;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(45deg,#00d4ff,#9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sections */
        .section {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 1.6rem;
            border: 1px solid rgba(0,212,255,0.2);
            margin-bottom: 1.6rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.3rem;
        }

        .section h2 {
            font-size: 1.1rem;
            color: #00d4ff;
            font-weight: 700;
        }

        .search-bar {
            padding: 0.7rem;
            border-radius: 10px;
            width: 270px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,212,255,0.3);
            color: #fff;
            font-size: 0.9rem;
        }

        .search-bar:focus {
            outline: none;
            box-shadow: 0 0 12px rgba(0,212,255,0.4);
            border-color: #00d4ff;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.25);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(45deg,#00d4ff,#9c27b0);
        }

        th {
            padding: 14px;
            font-weight: 600;
            text-align: left;
            color: #fff;
            font-size: 0.85rem;
        }

        td {
            padding: 14px;
            font-size: 0.85rem;
            color: #ddd;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Badges */
        .role-badge,.status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-doctor { background: rgba(0,212,255,0.25); color: #00d4ff; }
        .role-patient { background: rgba(0,255,127,0.2); color: #00ff7f; }
        .role-researcher { background: rgba(255,200,0,0.2); color: #ffeb3b; }

        .status-active { background: rgba(0,255,127,0.2); color: #00ff7f; }
        .status-inactive { background: rgba(255,68,68,0.2); color: #ff6b6b; }

        .btn-toggle, .btn-delete {
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-activate { background: #00c853; color: #fff; }
        .btn-deactivate { background: #ff3d5e; color: #fff; }
        .btn-delete { background: #6c757d; color: #fff; }

        .btn-toggle:hover, .btn-delete:hover {
            transform: translateY(-2px);
        }

        /* Logs */
        .logs-container {
            max-height: 350px;
            overflow-y: auto;
        }

        .log-item {
            padding: 1rem;
            border-left: 3px solid #00d4ff;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            margin-bottom: 0.9rem;
        }

        .log-time {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 0.3rem;
        }

        .log-action {
            font-size: 0.85rem;
            color: #fff;
        }

        .log-user {
            color: #00d4ff;
            font-weight: 600;
        }

        .no-results {
            color: #aaa;
            padding: 18px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .search-bar { width: 100%; }
            .header { flex-direction: column; gap: 1rem; }
            .header-actions a { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">

        <header>
            <h1>Admin Panel <span class="admin-badge">ADMIN</span></h1>
            <div class="header-actions">
                <a href="/reports">Reports</a>
                <a href="/logout">Logout</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total Users</h3><p id="totalUsers">0</p></div>
            <div class="stat-card"><h3>Active Users</h3><p id="activeUsers">0</p></div>
            <div class="stat-card"><h3>Inactive Users</h3><p id="inactiveUsers">0</p></div>
            <div class="stat-card"><h3>Total Actions Today</h3><p id="actionsToday">0</p></div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>User Management</h2>
                <input type="text" id="userSearch" class="search-bar" placeholder="Search users by name or email...">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
                <div id="noUsers" class="no-results" style="display:none;">No users found.</div>
            </div>
        </div>

        <div class="section">
            <h2>Activity Logs</h2>
            <div class="logs-container" id="activityLogs"></div>
        </div>
    </div>

<script>
// ===== FRONTEND STATE =====
let users = [];        // will be loaded from backend
let activityLogs = []; // will be loaded from backend

// ===== FETCH DATA FROM BACKEND (MongoDB Atlas) =====
async function fetchUsers() {
    try {
        const res = await fetch('/api/admin/users');  // Flask route
        if (!res.ok) throw new Error('Failed to load users');
        const data = await res.json();

        // Expecting: { users: [ {id/name/email/role/status}, ... ] } OR [ ... ]
        users = Array.isArray(data) ? data : (data.users || []);
        renderUsers();
    } catch (err) {
        console.error(err);
        document.getElementById('noUsers').style.display = 'block';
        document.getElementById('noUsers').textContent = 'Error loading users from server.';
    }
}

async function fetchLogs() {
    try {
        const res = await fetch('/api/admin/logs');  // Flask route
        if (!res.ok) throw new Error('Failed to load logs');
        const data = await res.json();

        // Expecting: { logs: [ {time, action, user, details}, ... ] } OR [ ... ]
        activityLogs = Array.isArray(data) ? data : (data.logs || []);
        renderLogs();
        updateStats();
    } catch (err) {
        console.error(err);
        const logsContainer = document.getElementById('activityLogs');
        logsContainer.innerHTML = '<div class="no-results">Error loading activity logs.</div>';
    }
}

// ===== RENDER USERS TABLE =====
function renderUsers(data = users) {
    const tbody = document.getElementById('usersTableBody');
    const noUsers = document.getElementById('noUsers');

    if (!data || data.length === 0) {
        tbody.innerHTML = '';
        noUsers.style.display = 'block';
        return;
    }

    noUsers.style.display = 'none';

    tbody.innerHTML = data.map(user => {
        // Support both _id from Mongo and id from API
        const id = user.id || user._id || user._id?.$oid || '';
        const role = (user.role || '').toLowerCase();
        const status = (user.status || 'inactive').toLowerCase();

        const roleClass = `role-${role}`;
        const statusClass = `status-${status}`;

        const toggleBtn = status === 'active'
            ? `<button class="btn-toggle btn-deactivate" onclick="toggleUserStatus('${id}')">Deactivate</button>`
            : `<button class="btn-toggle btn-activate" onclick="toggleUserStatus('${id}')">Activate</button>`;

        return `
            <tr>
                <td>${user.name || '-'}</td>
                <td>${user.email || '-'}</td>
                <td><span class="role-badge ${roleClass}">${role || 'N/A'}</span></td>
                <td><span class="status-badge ${statusClass}">${status}</span></td>
                <td>
                    ${toggleBtn}
                    <button class="btn-delete" onclick="deleteUser('${id}')">Delete</button>
                </td>
            </tr>
        `;
    }).join('');

    updateStats();
}

// ===== TOGGLE USER STATUS (FRONTEND + CALL BACKEND) =====
async function toggleUserStatus(userId) {
    try {
        // Optional: call backend to update status in MongoDB
        const res = await fetch(`/api/admin/users/${userId}/toggle-status`, {
            method: 'POST'
        });

        if (!res.ok) throw new Error('Failed to toggle user status');
        const updatedUser = await res.json(); // backend returns updated user

        // Update local array
        users = users.map(u => {
            const uid = u.id || u._id || u._id?.$oid;
            if (String(uid) === String(userId)) {
                return { ...u, status: updatedUser.status };
            }
            return u;
        });

        renderUsers();
        // Reload logs so action appears in Activity Logs
        fetchLogs();
    } catch (err) {
        console.error(err);
        alert('Error updating user status. Check server logs.');
    }
}

// ===== DELETE USER (FRONTEND + BACKEND) =====
async function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user?')) return;

    try {
        const res = await fetch(`/api/admin/users/${userId}`, {
            method: 'DELETE'
        });

        if (!res.ok) throw new Error('Failed to delete user');

        // Remove from local list
        users = users.filter(u => {
            const uid = u.id || u._id || u._id?.$oid;
            return String(uid) !== String(userId);
        });

        renderUsers();
        fetchLogs();
    } catch (err) {
        console.error(err);
        alert('Error deleting user. Check server logs.');
    }
}

// ===== SEARCH FILTER =====
document.getElementById('userSearch').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = users.filter(user =>
        (user.name || '').toLowerCase().includes(term) ||
        (user.email || '').toLowerCase().includes(term)
    );
    renderUsers(filtered);
});

// ===== STATS =====
function updateStats() {
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('activeUsers').textContent = users.filter(u => (u.status || '').toLowerCase() === 'active').length;
    document.getElementById('inactiveUsers').textContent = users.filter(u => (u.status || '').toLowerCase() === 'inactive').length;
    document.getElementById('actionsToday').textContent = activityLogs.length;
}

// ===== RENDER LOGS FROM BACKEND =====
function renderLogs() {
    const logsContainer = document.getElementById('activityLogs');

    if (!activityLogs || activityLogs.length === 0) {
        logsContainer.innerHTML = '<div class="no-results">No activity logs yet.</div>';
        return;
    }

    logsContainer.innerHTML = activityLogs.map(log => `
        <div class="log-item">
            <div class="log-time">${log.time || ''}</div>
            <div class="log-action">
                <span class="log-user">${log.user || ''}</span> - ${log.action || ''}
                ${log.details ? `<br><small>${log.details}</small>` : ''}
            </div>
        </div>
    `).join('');
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    fetchUsers();
    fetchLogs();
});
</script>

</script>
</body>
</html>
