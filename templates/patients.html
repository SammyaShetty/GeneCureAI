<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - GeneCure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 2rem;
            border: 1px solid rgba(0,212,255,0.18);
            backdrop-filter: blur(18px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0,212,255,0.3);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #00d4ff, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn {
            padding: 0.6rem 1.3rem;
            border-radius: 999px;
            border: 1px solid rgba(0,212,255,0.4);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            background: rgba(0,212,255,0.08);
            color: #00d4ff;
        }

        .btn:hover {
            background: linear-gradient(45deg, #00d4ff, #9c27b0);
            color: #fff;
            box-shadow: 0 0 15px rgba(0,212,255,0.5);
            transform: translateY(-1px);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            font-size: 0.85rem;
            color: #aaa;
            text-decoration: none;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
        }

        .search-section {
            margin-bottom: 1rem;
        }

        .search-bar {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.25);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.9rem;
        }

        .search-bar::placeholder {
            color: #888;
        }

        .search-bar:focus {
            outline: none;
            box-shadow: 0 0 12px rgba(0,212,255,0.5);
            border-color: #00d4ff;
        }

        .table-container {
            margin-top: 0.5rem;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.25);
            background: rgba(255,255,255,0.02);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            background: linear-gradient(45deg, #00d4ff, #9c27b0);
        }

        th {
            padding: 0.9rem;
            text-align: left;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.5;
            font-size: 0.7rem;
        }

        th.sorted-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sorted-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 0.85rem 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #ddd;
        }

        tbody tr:hover {
            background: rgba(0,212,255,0.07);
        }

        .risk-badge {
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .risk-high {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
        }

        .risk-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffd54f;
        }

        .risk-low {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .risk-na {
            background: rgba(158, 158, 158, 0.2);
            color: #e0e0e0;
        }

        .btn-view {
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(45deg, #00d4ff, #9c27b0);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-view:hover {
            transform: translateY(-1px) scale(1.03);
            box-shadow: 0 0 10px rgba(0,212,255,0.6);
        }

        .no-results {
            text-align: center;
            padding: 1.8rem;
            color: #aaa;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1.2rem 0.6rem;
            }

            .container {
                padding: 1.4rem;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            th, td {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Patient Management</h1>
            <div class="header-actions">
                <a href="/dashboard" class="btn">Back to Dashboard</a>
                <a href="/logout" class="btn">Logout</a>
            </div>
        </header>

        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/patients">Patients</a>
            <a href="/variant-explorer">Variant Explorer</a>
            <a href="/reports">Reports</a>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="searchBar" 
                class="search-bar" 
                placeholder="Search patients by name or ID..."
            >
        </div>

        <div class="table-container">
            <table id="patientsTable">
                <thead>
                    <tr>
                        <th class="sortable" data-column="id">Patient ID</th>
                        <th class="sortable" data-column="name">Name</th>
                        <th class="sortable" data-column="age">Age</th>
                        <th class="sortable" data-column="risk">Risk Level</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientsTableBody">
                    <!-- Filled via JS -->
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">
                No patients found matching your search.
            </div>
        </div>
    </div>

    <script>
        let patients = [];     // will come from backend
        let sortColumn = '';
        let sortDirection = 'asc';

        async function fetchPatients() {
            try {
                const res = await fetch('/api/doctor/patients'); // Flask route
                if (!res.ok) throw new Error('Failed to load patients');
                const data = await res.json();

                // Expecting { patients: [...] } or [...]
                patients = Array.isArray(data) ? data : (data.patients || []);
                renderTable(patients);
            } catch (err) {
                console.error(err);
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('noResults').textContent = 'Error loading patients from server.';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('patientsTableBody');
            const noResults = document.getElementById('noResults');

            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            tbody.innerHTML = data.map(patient => {
                const id = patient.id || patient._id || patient._id?.$oid || '-';
                const name = patient.name || '-';
                const age = patient.age || '-';
                const risk = (patient.risk || 'N/A');
                const riskLower = risk.toString().toLowerCase();
                const riskClass = ['high','medium','low'].includes(riskLower) ? `risk-${riskLower}` : 'risk-na';

                return `
                    <tr>
                        <td>${id}</td>
                        <td>${name}</td>
                        <td>${age}</td>
                        <td><span class="risk-badge ${riskClass}">${risk}</span></td>
                        <td>
                            <button class="btn-view" onclick="viewPatient('${id}')">
                                View Details
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Search functionality
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = patients.filter(patient => 
                (patient.name || '').toLowerCase().includes(searchTerm) ||
                (patient.id || '').toLowerCase().includes(searchTerm) ||
                (patient._id || '').toString().toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        });

        // Sorting
        document.querySelectorAll('th.sortable').forEach(header => {
            header.addEventListener('click', () => {
                const column = header.dataset.column;

                if (sortColumn === column) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = column;
                    sortDirection = 'asc';
                }

                document.querySelectorAll('th.sortable').forEach(th => {
                    th.classList.remove('sorted-asc', 'sorted-desc');
                });
                header.classList.add(sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');

                const sorted = [...patients].sort((a, b) => {
                    let aVal, bVal;

                    if (column === 'id') {
                        aVal = (a.id || a._id || '').toString();
                        bVal = (b.id || b._id || '').toString();
                    } else {
                        aVal = a[column];
                        bVal = b[column];
                    }

                    if (column === 'age') {
                        aVal = parseInt(aVal) || 0;
                        bVal = parseInt(bVal) || 0;
                    } else {
                        aVal = (aVal || '').toString().toLowerCase();
                        bVal = (bVal || '').toString().toLowerCase();
                    }

                    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                renderTable(sorted);
            });
        });

        // View patient in details page (doctor view)
        function viewPatient(patientId) {
            // This assumes you have /doctor/patient_details route
            window.location.href = `/doctor/patient_details?id=${encodeURIComponent(patientId)}`;
        }

        document.addEventListener('DOMContentLoaded', fetchPatients);
    </script>
</body>
</html>
